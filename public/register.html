  <!-- SweetAlert2 -->

</head>

<body>

  <!-- Standalone Mobile Hamburger Menu Toggle Button -->
  <button id="menu-toggle-btn" class="btn-circle" aria-label="Toggle menu">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- Decorative Blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <div class="app-container">

    <!-- Sidebar Navigation -->
    <aside class="sidebar collapsed">
      <div class="sidebar-logo">Med-Alert</div>
      <ul class="sidebar-menu">
        <li class="sidebar-item">
          <a class="sidebar-link" data-tab="dashboard" href="dashboard.html?tab=dashboard">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
            </svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a class="sidebar-link" data-tab="medicines" href="dashboard.html?tab=medicines">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
            </svg>
            <span>Medicines</span>
          </a>
        </li>
        <li class="sidebar-item" id="sidebarPeriodItem" style="display: none;">
          <a class="sidebar-link" data-tab="period" href="dashboard.html?tab=period">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
            <span>Period Tracker</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a class="sidebar-link" data-tab="reports" href="dashboard.html?tab=reports">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span>Medical Reports</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a class="sidebar-link" data-tab="appointments" href="dashboard.html?tab=appointments">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span>Appointments</span>
          </a>
        </li>
        <li class="sidebar-item">
          <a class="sidebar-link" data-tab="settings" href="dashboard.html?tab=settings">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span>Account Settings</span>
          </a>
        </li>
      </ul>
      <div class="sidebar-user">
        <img id="sidebarUserPhoto" class="sidebar-avatar" src="https://via.placeholder.com/150?text=Avatar"
          alt="User Avatar">
        <div class="sidebar-user-info">
          <div id="sidebarUserName" class="sidebar-user-name">User Name</div>
          <div class="sidebar-user-role">Med-Alert Patient</div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="auth-container">
    <div class="glass-panel auth-card">
      <div class="auth-logo">Med-Alert</div>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join us to manage your health and medications smartly.</p>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-input-container">
            <input type="password" id="password" class="form-control" placeholder="Create password (min 6 characters)"
              required style="width: 100%; padding-right: 48px;">
            <button type="button" class="password-toggle-btn" id="togglePasswordBtn"
              aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" width="20" height="20">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <div class="password-input-container">
            <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required
              style="width: 100%; padding-right: 48px;">
            <button type="button" class="password-toggle-btn" id="toggleConfirmPasswordBtn"
              aria-label="Toggle password visibility">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" width="20" height="20">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Register</button>
      </form>

      <div class="auth-footer-link">
        Already have an account? <a href="login.html">Log In</a>
      </div>
    </div>
  </div>
  </main>
  </div>

  <script src="sidebar.js"></script>
  <script src="register.js"></script>
</body>

</html>
