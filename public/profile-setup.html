      <div class="sidebar-user">
        <img id="sidebarUserPhoto" class="sidebar-avatar" src="https://via.placeholder.com/150?text=Avatar"
          alt="User Avatar">

          <div id="sidebarUserName" class="sidebar-user-name">User Name</div>
          <div class="sidebar-user-role">Med-Alert Patient</div>
        </div>

    <main class="main-content">
      <div class="auth-container" style="padding-top: 60px; padding-bottom: 60px;">
    <div class="glass-panel auth-card" style="max-width: 650px; padding: 35px;">
      <div class="auth-logo" style="margin-bottom: 20px;">Med-Alert</div>
      <h2 class="auth-title" style="margin-bottom: 20px;">Setup Your Health Profile</h2>

      <!-- Progress Bar Indicators -->
      <div class="setup-progress">
        <div class="setup-progress-bar" id="progressBar"></div>
        <div class="progress-step active" data-step="1">1</div>
        <div class="progress-step" data-step="2">2</div>
        <div class="progress-step" data-step="3">3</div>
      </div>

      <form id="setupForm">

        <!-- STEP 1: Personal Information -->
        <div class="setup-step-content active" id="step1">
          <h3 style="margin-bottom: 20px; font-weight: 700;">1. Personal Information</h3>

          <div class="photo-upload-container">
            <div class="photo-preview-wrapper">
              <img id="photoPreview" class="photo-preview" src="https://via.placeholder.com/150?text=Photo"
                alt="Profile Preview">
            </div>
            <input type="file" id="profilePhotoInput" accept="image/*" style="display: none;">
            <button type="button" class="photo-upload-btn" id="uploadPhotoBtn">Upload Photo</button>
          </div>

          <div class="form-group">
            <label class="form-label" for="fullName">Full Name</label>
            <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
          </div>

          <div class="flex-row-group">
            <div class="form-group">
              <label class="form-label" for="dob">Date of Birth</label>
              <input type="date" id="dob" class="form-control" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="age">Age</label>
              <input type="number" id="age" class="form-control" placeholder="Calculated" readonly>
            </div>
          </div>

          <div class="flex-row-group">
            <div class="form-group">
              <label class="form-label" for="gender">Gender</label>
              <select id="gender" class="form-control" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Women (Female)</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="phone">Phone Number</label>
              <input type="tel" id="phone" class="form-control" placeholder="+1234567890" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="address">Address</label>
            <textarea id="address" class="form-control" placeholder="Your residential address" rows="2"
              style="resize: none;" required></textarea>
          </div>
        </div>

        <!-- STEP 2: Medical Information -->
        <div class="setup-step-content" id="step2">
          <h3 style="margin-bottom: 20px; font-weight: 700;">2. Medical Profile</h3>

          <div class="flex-row-group">
            <div class="form-group">
              <label class="form-label" for="bloodGroup">Blood Group</label>
              <select id="bloodGroup" class="form-control" required>
                <option value="" disabled selected>Select Blood Group</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="height">Height (cm)</label>
              <input type="number" id="height" class="form-control" placeholder="e.g. 175" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="weight">Weight (kg)</label>
              <input type="number" id="weight" class="form-control" placeholder="e.g. 70" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="allergies">Allergies (If any)</label>
            <input type="text" id="allergies" class="form-control"
              placeholder="e.g. Peanuts, Penicillin (leave empty if none)">
          </div>

          <div class="form-group">
            <label class="form-label" for="chronicDiseases">Chronic Diseases</label>
            <input type="text" id="chronicDiseases" class="form-control"
              placeholder="e.g. Diabetes, Hypertension (leave empty if none)">
          </div>

          <div class="form-group">
            <label class="form-label" for="currentMedications">Current Medications</label>
            <input type="text" id="currentMedications" class="form-control"
              placeholder="e.g. Metformin 500mg, Insulin (leave empty if none)">
          </div>

          <div class="flex-row-group">
            <div class="form-group">
              <label class="form-label" for="doctorName">Doctor Name</label>
              <input type="text" id="doctorName" class="form-control" placeholder="Dr. Smith">
            </div>
            <div class="form-group">
              <label class="form-label" for="doctorContact">Doctor Contact Number</label>
              <input type="tel" id="doctorContact" class="form-control" placeholder="Doctor's Phone">
            </div>
          </div>
        </div>

        <!-- STEP 3: Emergency Contact -->
        <div class="setup-step-content" id="step3">
          <h3 style="margin-bottom: 20px; font-weight: 700;">3. Emergency Contact Details</h3>

          <div class="form-group">
            <label class="form-label" for="emergencyName">Emergency Contact Name</label>
            <input type="text" id="emergencyName" class="form-control" placeholder="Full name of contact" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="emergencyRelationship">Relationship</label>
            <select id="emergencyRelationship" class="form-control" required>
              <option value="" disabled selected>Select Relationship</option>
              <option value="Father">Father</option>
              <option value="Mother">Mother</option>
              <option value="Brother">Brother</option>
              <option value="Sister">Sister</option>
              <option value="Spouse">Spouse</option>
              <option value="Friend">Friend</option>
              <option value="Others">Others (Specify below)</option>
            </select>
          </div>

          <div class="form-group" id="relationshipOtherGroup" style="display: none;">
            <label class="form-label" for="relationshipOther">Specify Relationship</label>
            <input type="text" id="relationshipOther" class="form-control" placeholder="e.g. Guardian, Uncle">
          </div>

          <div class="flex-row-group">
            <div class="form-group">
              <label class="form-label" for="emergencyPhone">Phone Number</label>
              <input type="tel" id="emergencyPhone" class="form-control" placeholder="Primary Phone" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="emergencyAltPhone">Alternate Phone Number</label>
              <input type="tel" id="emergencyAltPhone" class="form-control" placeholder="Alternate Phone">
            </div>
          </div>
        </div>

        <!-- Setup Actions Navigation -->
        <div style="display: flex; justify-content: space-between; margin-top: 30px; gap: 15px;">
          <button type="button" class="btn btn-secondary" id="backBtn" style="display: none; flex: 1;">Back</button>
          <button type="button" class="btn btn-primary" id="nextBtn" style="flex: 1;">Next</button>
          <button type="submit" class="btn btn-primary" id="submitBtn" style="display: none; flex: 1;">Complete
            Setup</button>
        </div>
      </form>
    </div>
  </div>
  </main>

  <script src="profile-setup.js"></script>
